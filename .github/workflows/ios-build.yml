name: iOS Build

# Build (Release), run unit tests, and produce an unsigned .ipa.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-test-ipa:
    name: Build, Test & Package IPA
    runs-on: macos-latest

    env:
      PROJECT: Obsidium.xcodeproj
      SCHEME: Obsidium
      CONFIGURATION: Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest stable Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Prepare log directory
        run: mkdir -p build-logs

      - name: Show environment
        run: |
          xcodebuild -version | tee build-logs/environment.log
          xcodebuild -list -project "$PROJECT" | tee -a build-logs/environment.log

      # Resolve a simulator robustly. Primary source: the destinations
      # xcodebuild itself reports as eligible for the scheme (capturing BOTH
      # streams — the list can land on stderr). Fallback: any available iPhone
      # on an iOS 26 runtime (matching the deployment target, so it can't be a
      # below-target device that xcodebuild would reject). The raw list is
      # printed for easy debugging.
      - name: Resolve a simulator
        id: sim
        run: |
          echo "::group::xcodebuild -showdestinations"
          DESTS=$(xcodebuild -showdestinations -project "$PROJECT" -scheme "$SCHEME" 2>&1 || true)
          echo "$DESTS"
          echo "::endgroup::"

          # Placeholder/iPad/Vision rows are dropped by the iPhone + Simulator
          # filters; remaining rows are real simulator devices with hex UDIDs.
          UDID=$(printf '%s\n' "$DESTS" \
            | grep 'platform:iOS Simulator' \
            | grep 'name:iPhone' \
            | sed -nE 's/.*, id:([0-9A-Fa-f-]+),.*/\1/p' \
            | head -1)

          if [ -z "$UDID" ]; then
            echo "showdestinations yielded nothing; falling back to simctl (iOS 26)"
            UDID=$(xcrun simctl list devices available -j \
              | jq -r '[.devices | to_entries[]
                        | select(.key | test("iOS-26"))
                        | .value[] | select(.name | test("iPhone"))][0].udid')
          fi

          if [ -z "$UDID" ] || [ "$UDID" = "null" ]; then
            echo "No eligible iPhone simulator found"; exit 1
          fi
          echo "Using simulator UDID: $UDID"
          echo "udid=$UDID" >> "$GITHUB_OUTPUT"

      - name: Run unit tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "id=${{ steps.sim.outputs.udid }}" \
            CODE_SIGNING_ALLOWED=NO \
            | tee build-logs/test.log

      - name: Archive (Release, unsigned)
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration "$CONFIGURATION" \
            -destination 'generic/platform=iOS' \
            -archivePath build/Obsidium.xcarchive \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tee build-logs/archive.log

      # `-exportArchive` insists on a signing identity, so for an unsigned build
      # we package the .app directly: a Payload/ folder zipped as .ipa.
      - name: Package unsigned IPA
        run: |
          APP_PATH=$(find build/Obsidium.xcarchive/Products/Applications \
            -maxdepth 1 -name "*.app" | head -1)
          echo "Packaging: $APP_PATH"
          mkdir -p build/Payload
          cp -R "$APP_PATH" build/Payload/
          (cd build && zip -qry Obsidium-unsigned.ipa Payload)
          ls -lh build/Obsidium-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: Obsidium-unsigned-ipa
          path: build/Obsidium-unsigned.ipa
          if-no-files-found: error

      - name: Upload build logs
        if: always()   # keep logs even when an earlier step fails
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build-logs/
          if-no-files-found: warn

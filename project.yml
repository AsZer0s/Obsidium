# XcodeGen project spec for Obsidium.
# Generate the Xcode project with:  xcodegen generate
# (CI does this automatically — see .github/workflows/ios-build.yml)

name: Obsidium

options:
  bundleIdPrefix: com.obsidium
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

# Project-wide build settings. Keeps everything unsigned so CI never needs a
# certificate; the app uses only standard iOS crypto (HMAC) so no signing is
# required to build or archive.
settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    CODE_SIGNING_ALLOWED: NO
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGN_IDENTITY: ""

targets:
  Obsidium:
    type: application
    platform: iOS
    sources:
      - path: Obsidium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.obsidium.app
        TARGETED_DEVICE_FAMILY: "1,2"           # iPhone + iPad
        # Info.plist is generated; the camera key is injected here.
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSCameraUsageDescription: "Obsidium uses the camera only to scan 2FA QR codes. Nothing is recorded or sent anywhere."
        INFOPLIST_KEY_NSFaceIDUsageDescription: "Obsidium uses Face ID to protect sensitive actions like deleting tokens and exporting your backup."
        INFOPLIST_KEY_UILaunchScreen_Generation: YES

  ObsidiumTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ObsidiumTests
    # Depending on the app target makes XcodeGen wire up the test host so
    # `@testable import Obsidium` works.
    dependencies:
      - target: Obsidium
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.obsidium.app.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  Obsidium:
    build:
      targets:
        Obsidium: all
        ObsidiumTests: [test]
    test:
      targets:
        - ObsidiumTests
    run:
      config: Debug
    archive:
      config: Release
